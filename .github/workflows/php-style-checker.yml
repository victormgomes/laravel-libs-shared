name: PHP Code Style Checker

on:
    workflow_call:

jobs:
    php-code-styling:
        runs-on: ubuntu-latest
        timeout-minutes: 5

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Check PHP code style issues
              uses: aglipanci/laravel-pint-action@2.6
              with:
                  testMode: true
